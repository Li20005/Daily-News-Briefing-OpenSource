name: Daily Brief Auto Run

on:
  schedule:
    # UTC 0点 = 北京时间早上8:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动启动测试

jobs:
  run-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai feedparser python-dotenv

      - name: Run daily brief script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
        run: python main_opensource.py
